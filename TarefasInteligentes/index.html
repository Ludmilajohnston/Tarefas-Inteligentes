<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas Inteligentes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192x192.png">
  <meta name="theme-color" content="#4f46e5">
</head>
<body>

  <div class="container">

    <div class="top-bar">
      <h1>Tarefas Inteligentes</h1>
      <button id="themeToggle" aria-label="Alternar tema">🌙</button>
    </div>

    <!-- Área de input -->
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Digite uma tarefa..." autocomplete="off" aria-label="Nova tarefa">

      <div class="input-row">
        <select id="category" aria-label="Categoria"></select>
        <select id="priority" aria-label="Prioridade"></select>
      </div>

      <input type="date" id="deadline" aria-label="Prazo (opcional)">

      <div class="action-row">
        <button id="addBtn">Adicionar</button>
        <button id="cancelEditBtn" class="cancel-btn hidden">Cancelar</button>
      </div>
    </div>

    <!-- Busca -->
    <div class="search-area">
      <input type="text" id="searchInput" placeholder="🔍 Buscar tarefas..." autocomplete="off" aria-label="Buscar tarefas">
    </div>

    <!-- Filtros -->
    <div class="filters" role="group" aria-label="Filtrar tarefas">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="pending">Pendentes</button>
      <button class="filter-btn" data-filter="completed">Concluídas</button>
    </div>

    <p id="taskCount">Tarefas pendentes: 0</p>

    <ul id="taskList" aria-live="polite"></ul>

  </div>

  <!-- Modal de confirmação -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalMessage">
    <div class="modal-box">
      <p id="modalMessage">Tem certeza?</p>
      <div class="modal-buttons">
        <button id="modalConfirm" class="delete-btn">Confirmar</button>
        <button id="modalCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
